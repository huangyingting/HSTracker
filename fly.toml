app = "huangyingting-hs-tracker"
primary_region = "sin"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "rolling"
  max_unavailable = 1
  wait_timeout = "20m"

[env]
  HOSTNAME = "0.0.0.0"
  PORT = "3000"
  HS_TRACKER_MACHINE_CLASS = "shared-cpu-2x"
  HS_TRACKER_RUNTIME_MODE = "release"
  HS_TRACKER_RELEASE_VOLUME_PATH = "/data/releases"
  HS_TRACKER_RELEASE_S3_REGION = "auto"
  HS_TRACKER_RELEASE_S3_ENDPOINT = "https://t3.storage.dev"
  HS_TRACKER_RELEASE_S3_FORCE_PATH_STYLE = "false"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 32

  [http_service.tls_options]
    alpn = ["h2", "http/1.1"]
    versions = ["TLSv1.2", "TLSv1.3"]

  [[http_service.checks]]
    grace_period = "1m"
    interval = "15s"
    method = "GET"
    timeout = "3s"
    path = "/healthz"

    [http_service.checks.headers]
      X-Forwarded-Proto = "https"

[mounts]
  source = "hs_tracker_releases"
  destination = "/data"
  initial_size = "50gb"
  snapshot_retention = 5

[metrics]
  port = 3000
  path = "/metrics"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

[[restart]]
  policy = "on-failure"
  retries = 10
