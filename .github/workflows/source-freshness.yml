name: Source freshness

on:
  schedule:
    - cron: "17 3 * 1,2 *"
    - cron: "17 3 * 3-12 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-cepii:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: source-monitor
    env:
      HS_TRACKER_RELEASE_S3_BUCKET: ${{ secrets.HS_TRACKER_RELEASE_S3_BUCKET }}
      HS_TRACKER_RELEASE_S3_REGION: ${{ secrets.HS_TRACKER_RELEASE_S3_REGION }}
      HS_TRACKER_RELEASE_S3_ENDPOINT: ${{ secrets.HS_TRACKER_RELEASE_S3_ENDPOINT }}
      HS_TRACKER_RELEASE_S3_FORCE_PATH_STYLE: ${{ secrets.HS_TRACKER_RELEASE_S3_FORCE_PATH_STYLE }}
      HS_TRACKER_RELEASE_WRITE_ACCESS_KEY_ID: ${{ secrets.HS_TRACKER_RELEASE_WRITE_ACCESS_KEY_ID }}
      HS_TRACKER_RELEASE_WRITE_SECRET_ACCESS_KEY: ${{ secrets.HS_TRACKER_RELEASE_WRITE_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.13.0

      - name: Install dependencies
        run: npm ci

      - name: Check CEPII BACI Release
        run: npm run source:monitor
